spring.application.name=HRM_backend

# Database configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/hrm_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate/JPA settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Port Configuration
server.port=8080

# JWT Configuration
# Secret key (Base64 encoded, 256-bit minimum for HS256)
app.jwt.secret=dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySFJNU3lzdGVtSldUVG9rZW5HZW5lcmF0aW9uMjAyNg==
# Token hết hạn sau 24 giờ (86400000 ms)
app.jwt.expiration-ms=86400000
